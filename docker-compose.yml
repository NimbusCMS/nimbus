# NimbusCMS local stack: app (PHP built-in server) + MySQL 8 + Adminer.
services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: nimbus
      DB_USER: nimbus
      DB_PASS: nimbus
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nimbus
      MYSQL_USER: nimbus
      MYSQL_PASSWORD: nimbus
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  db_data: {}
