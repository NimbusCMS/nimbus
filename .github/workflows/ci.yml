name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nimbus_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s --health-timeout=5s --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, gd, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # Runs before the tests: a type error should fail fast, and it needs no database.
      - name: Static analysis
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Run tests
        run: vendor/bin/phpunit
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_PORT: '3306'
          TEST_DB_NAME: nimbus_test
          TEST_DB_USER: root
          TEST_DB_PASS: root
